<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Your Invoice — Estate Checkout</title>
  <style>
    /* V2 design tokens — inlined since ticket.html doesn't share styles.css */
    :root {
      --color-bg: #F2F2F7;
      --color-surface: #FFFFFF;
      --color-surface-tinted: #F2F2F7;
      --color-text: #1C1C1E;
      --color-text-secondary: #8E8E93;
      --color-text-tertiary: #C7C7CC;
      --color-divider: #E5E5EA;
      --color-success: #34C759;
      --color-danger: #FF3B30;
      --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      --font-family-number: -apple-system, 'SF Pro Rounded', ui-rounded, system-ui, sans-serif;
      --radius-md: 10px;
      --radius-lg: 14px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 20px;
      --space-2xl: 28px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-lg);
      letter-spacing: -0.01em;
    }

    .ticket {
      width: 100%;
      max-width: 420px;
      margin-top: var(--space-sm);
    }

    /* Header card — order name + sale info */
    .ticket__header-card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: var(--space-xl) var(--space-lg);
      text-align: center;
      margin-bottom: var(--space-md);
    }

    .ticket__order-name {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: var(--space-xs);
    }

    .ticket__sale-info {
      font-size: 13px;
      color: var(--color-text-secondary);
      letter-spacing: 0.01em;
    }

    /* Hero amount card */
    .ticket__hero-card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: var(--space-2xl) var(--space-lg);
      text-align: center;
      margin-bottom: var(--space-md);
    }

    .ticket__hero-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: var(--space-sm);
    }

    .ticket__hero-amount {
      font-family: var(--font-family-number);
      font-size: 56px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.03em;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    .ticket__discount-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-top: var(--space-md);
      padding-top: var(--space-md);
      border-top: 1px solid var(--color-divider);
    }

    .ticket__discount-label {
      letter-spacing: 0.01em;
    }

    .ticket__discount-original {
      text-decoration: line-through;
      color: var(--color-text-tertiary);
    }

    /* Items card */
    .ticket__items-card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: var(--space-md);
    }

    .ticket__items-card-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: var(--space-md) var(--space-lg) var(--space-sm);
    }

    .ticket__items {
      list-style: none;
    }

    .ticket__item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      border-bottom: 1px solid var(--color-divider);
      min-height: 48px;
    }

    .ticket__item:last-child {
      border-bottom: none;
    }

    .ticket__item-desc {
      flex: 1;
      font-size: 17px;
      color: var(--color-text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ticket__item-price {
      font-family: var(--font-family-number);
      font-size: 17px;
      font-weight: 600;
      color: var(--color-text);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .ticket__item-original {
      text-decoration: line-through;
      color: var(--color-text-tertiary);
      font-weight: 400;
      margin-right: var(--space-xs);
    }

    /* QR card — for payment worker to scan from customer's phone */
    .ticket__qr-card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      text-align: center;
      margin-bottom: var(--space-md);
    }

    .ticket__qr-instruction {
      font-size: 17px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: var(--space-lg);
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .ticket__qr-code {
      display: inline-block;
      padding: var(--space-md);
      background: #FFFFFF;
      border-radius: var(--radius-md);
    }

    .ticket__timestamp {
      text-align: center;
      font-size: 12px;
      color: var(--color-text-tertiary);
      margin-top: var(--space-md);
      letter-spacing: 0.01em;
    }

    .ticket__footer {
      text-align: center;
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: var(--space-xl);
      letter-spacing: 0.02em;
    }

    /* Error state */
    .ticket__error {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      text-align: center;
      padding: var(--space-2xl) var(--space-lg);
    }

    .ticket__error-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto var(--space-md);
      color: var(--color-text-tertiary);
    }

    .ticket__error-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: var(--space-xs);
      letter-spacing: -0.01em;
    }

    .ticket__error-msg {
      font-size: 15px;
      color: var(--color-text-secondary);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="ticket" id="ticket">
    <!-- Rendered by JS -->
  </div>
  <div class="ticket__footer">Powered by Estate Checkout</div>

  <script src="/lib/qrcode.min.js"></script>
  <script>
    (function() {
      const ticketEl = document.getElementById('ticket');

      function formatCurrency(amount) {
        return '$' + (typeof amount === 'number' ? amount.toFixed(2) : '0.00');
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function formatTime(ts) {
        if (!ts) return '';
        try {
          const d = new Date(ts);
          return d.toLocaleString('en-US', {
            month: 'short', day: 'numeric',
            hour: 'numeric', minute: '2-digit', hour12: true
          });
        } catch (e) {
          return '';
        }
      }

      function renderError(msg) {
        ticketEl.innerHTML = `
          <div class="ticket__error">
            <svg class="ticket__error-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="24" cy="24" r="20"/>
              <path d="M24 14v12M24 32v.01"/>
            </svg>
            <div class="ticket__error-title">Invoice Not Found</div>
            <div class="ticket__error-msg">${escapeHtml(msg || 'This link may be invalid or expired.')}</div>
          </div>
        `;
      }

      try {
        const params = new URLSearchParams(window.location.search);
        let encoded = params.get('d');

        if (!encoded) {
          renderError('No invoice data in this link.');
          return;
        }

        // Restore standard base64 from URL-safe format
        encoded = encoded.replace(/-/g, '+').replace(/_/g, '/');
        while (encoded.length % 4) encoded += '=';
        const jsonStr = decodeURIComponent(escape(atob(encoded)));
        const data = JSON.parse(jsonStr);

        if (!data.items || typeof data.total !== 'number') {
          renderError('This invoice data is incomplete.');
          return;
        }

        const orderName = data.orderName || ('Invoice #' + (data.customerNumber || '?'));
        const saleName = data.sale || 'Estate Sale';
        const dayLabel = data.day ? `Day ${data.day}` : '';
        const discountLabel = data.discount > 0 ? `${data.discount}% off` : '';
        const saleInfo = [saleName, dayLabel, discountLabel].filter(Boolean).join(' · ');

        const itemsHtml = data.items.map(item => {
          const desc = item.desc || 'Item';
          const hasHaggle = item.haggle && item.haggle.value;
          const hasDayDiscount = item.day !== undefined && item.orig !== item.day;

          let priceHtml;
          if (hasHaggle) {
            priceHtml = `<span class="ticket__item-original">${formatCurrency(item.orig)}</span>`;
            if (hasDayDiscount) {
              priceHtml += `<span class="ticket__item-original">${formatCurrency(item.day)}</span>`;
            }
            priceHtml += formatCurrency(item.final);
          } else if (item.orig !== item.final) {
            priceHtml = `<span class="ticket__item-original">${formatCurrency(item.orig)}</span>${formatCurrency(item.final)}`;
          } else {
            priceHtml = formatCurrency(item.final);
          }

          return `
            <li class="ticket__item">
              <span class="ticket__item-desc">${escapeHtml(desc)}</span>
              <span class="ticket__item-price">${priceHtml}</span>
            </li>
          `;
        }).join('');

        const timeStr = formatTime(data.ts);

        let discountLineHtml = '';
        if (data.ticketDiscount && data.ticketDiscount.value) {
          const subtotal = data.subtotal || data.total;
          const tdLabel = data.ticketDiscount.type === 'percent'
            ? `${data.ticketDiscount.value}% off`
            : `${formatCurrency(data.ticketDiscount.value)} off`;
          discountLineHtml = `
            <div class="ticket__discount-line">
              <span class="ticket__discount-label">${escapeHtml(tdLabel)}</span>
              <span class="ticket__discount-original">${formatCurrency(subtotal)}</span>
            </div>
          `;
        }

        ticketEl.innerHTML = `
          <div class="ticket__header-card">
            <div class="ticket__order-name">${escapeHtml(orderName)}</div>
            <div class="ticket__sale-info">${escapeHtml(saleInfo)}</div>
          </div>

          <div class="ticket__hero-card">
            <div class="ticket__hero-label">Total</div>
            <div class="ticket__hero-amount">${formatCurrency(data.total)}</div>
            ${discountLineHtml}
          </div>

          <div class="ticket__items-card">
            <div class="ticket__items-card-label">Items</div>
            <ul class="ticket__items">${itemsHtml}</ul>
          </div>

          <div class="ticket__qr-card">
            <div class="ticket__qr-instruction">Show this code at the payment table</div>
            <div class="ticket__qr-code" id="ticket-qr"></div>
          </div>

          ${timeStr ? `<div class="ticket__timestamp">${escapeHtml(timeStr)}</div>` : ''}
        `;

        if (typeof QRCode !== 'undefined') {
          new QRCode(document.getElementById('ticket-qr'), {
            text: window.location.href,
            width: 220,
            height: 220,
            colorDark: '#000000',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.L
          });
        }
      } catch (e) {
        console.error('Invoice parse error:', e);
        renderError('Could not read invoice data.');
      }
    })();
  </script>
</body>
</html>
