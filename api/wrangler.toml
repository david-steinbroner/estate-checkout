name = "estate-checkout-api"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# D1 database binding
# After running `wrangler d1 create estate-checkout`, replace database_id
# with the UUID wrangler prints. See README.md for step-by-step setup.
[[d1_databases]]
binding = "DB"
database_name = "estate-checkout"
database_id = "6632eb68-7e74-44b0-b6e0-ef9d96021696"
migrations_dir = "migrations"
