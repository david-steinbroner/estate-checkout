<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <title>Resetting Estate Checkout</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      text-align: center;
      padding: 40px 20px;
      color: #1C1C1E;
      background: #F2F2F7;
      margin: 0;
      min-height: 100vh;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 12px 0;
    }
    p {
      font-size: 17px;
      color: #8E8E93;
      margin: 8px 0;
      line-height: 1.4;
    }
    .status {
      margin-top: 40px;
      padding: 16px 20px;
      background: #FFFFFF;
      border-radius: 14px;
      font-size: 15px;
      color: #007AFF;
      font-weight: 600;
    }
    .done {
      color: #34C759;
    }
    .error {
      color: #FF3B30;
    }
    .log {
      margin-top: 24px;
      font-size: 13px;
      color: #8E8E93;
      text-align: left;
      font-family: ui-monospace, 'SF Mono', monospace;
      line-height: 1.6;
      background: #FFFFFF;
      padding: 12px 16px;
      border-radius: 10px;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }
    .log-line { display: block; }
  </style>
</head>
<body>
  <h1>Resetting Estate Checkout</h1>
  <p>Clearing cache and loading the latest version.</p>
  <p>This takes a couple of seconds. Don't close this page.</p>

  <div class="status" id="status">Starting…</div>
  <div class="log" id="log"></div>

  <script>
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (cls ? ' ' + cls : '');
    }

    function logLine(msg) {
      const span = document.createElement('span');
      span.className = 'log-line';
      span.textContent = '• ' + msg;
      logEl.appendChild(span);
    }

    async function reset() {
      try {
        // Step 1: unregister all service workers
        setStatus('Unregistering service workers…');
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          logLine('Found ' + regs.length + ' registered service worker(s)');
          for (const reg of regs) {
            const scope = reg.scope;
            await reg.unregister();
            logLine('Unregistered: ' + scope);
          }
        } else {
          logLine('Service workers not supported in this browser');
        }

        // Step 2: delete all caches
        setStatus('Clearing caches…');
        if ('caches' in window) {
          const names = await caches.keys();
          logLine('Found ' + names.length + ' cache(s)');
          for (const name of names) {
            await caches.delete(name);
            logLine('Deleted cache: ' + name);
          }
        }

        // Step 3: redirect to fresh load
        setStatus('Done — loading the latest version…', 'done');
        logLine('Redirecting in 1 second');
        setTimeout(() => {
          // Cache-busting query string so the browser treats it as a new URL
          window.location.replace('/?reset=' + Date.now());
        }, 1000);
      } catch (err) {
        setStatus('Something went wrong. Reload this page to try again.', 'error');
        logLine('Error: ' + (err && err.message ? err.message : String(err)));
      }
    }

    reset();
  </script>
</body>
</html>
